name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "cursor/**"

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and format check
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Critical dependency audit
        run: npm audit --omit=dev --audit-level=critical
