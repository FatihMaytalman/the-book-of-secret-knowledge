name: aomlegacy-family-tree

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - immich-server
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/aomlegacy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    depends_on:
      immich-redis:
        condition: service_started
      immich-postgres:
        condition: service_healthy
      immich-machine-learning:
        condition: service_started
    environment:
      DB_HOSTNAME: immich-postgres
      DB_USERNAME: ${IMMICH_DB_USERNAME:-immich}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: ${IMMICH_DB_NAME:-immich}
      REDIS_HOSTNAME: immich-redis
      IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
      TZ: ${TZ:-UTC}
    volumes:
      - ${MEDIA_PRIMARY_PATH:-/mnt/aom-media-primary}/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    networks:
      - edge
      - media

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    volumes:
      - immich-model-cache:/cache
    networks:
      - media

  immich-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - media

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${IMMICH_DB_USERNAME:-immich}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_DB: ${IMMICH_DB_NAME:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --dbname=\"$${POSTGRES_DB}\" --username=\"$${POSTGRES_USER}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media

  aom-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AOM_DB_USERNAME:-aomlegacy}
      POSTGRES_PASSWORD: ${AOM_DB_PASSWORD}
      POSTGRES_DB: ${AOM_DB_NAME:-aomlegacy}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --dbname=\"$${POSTGRES_DB}\" --username=\"$${POSTGRES_USER}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  aom-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/redis:/data
    networks:
      - app

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2g}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1g}
    volumes:
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/neo4j/data:/data
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/neo4j/logs:/logs
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/neo4j/import:/var/lib/neo4j/import
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/neo4j/plugins:/plugins
    networks:
      - app

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/aom/qdrant:/qdrant/storage
    networks:
      - app

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - ${SSD_DATA_PATH:-/srv/aomlegacy}/clamav:/var/lib/clamav
    networks:
      - app

  aom-api:
    image: node:22-alpine
    profiles: ["aom-placeholders"]
    working_dir: /workspace/apps/api
    command: ["sh", "-c", "echo 'AOM API placeholder: scaffold NestJS here' && sleep infinity"]
    env_file:
      - .env
    volumes:
      - ../../apps/api:/workspace/apps/api
    depends_on:
      aom-postgres:
        condition: service_healthy
      aom-redis:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      clamav:
        condition: service_started
    networks:
      - edge
      - app
      - media

  aom-web:
    image: node:22-alpine
    profiles: ["aom-placeholders"]
    working_dir: /workspace/apps/web
    command: ["sh", "-c", "echo 'AOM Web placeholder: scaffold Next.js here' && sleep infinity"]
    env_file:
      - .env
    volumes:
      - ../../apps/web:/workspace/apps/web
    depends_on:
      - aom-api
    networks:
      - edge

volumes:
  immich-model-cache:

networks:
  edge:
  media:
    internal: true
  app:
    internal: true
